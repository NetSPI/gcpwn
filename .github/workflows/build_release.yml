name: Build Release Executables

on:
  workflow_dispatch:
    inputs:
      run_tests:
        description: "Run unit tests before building binaries"
        required: true
        type: boolean
        default: true
      release_tag:
        description: "Release tag to create/update (example: v0.5.2)"
        required: true
        type: string
      release_title:
        description: "Release title shown on GitHub Releases page"
        required: true
        type: string
      release_notes:
        description: "Release notes/body text for the GitHub Release"
        required: true
        type: string
      build_linux:
        description: "Build Linux binary (ubuntu-latest)"
        required: true
        type: boolean
        default: true
      build_macos:
        description: "Build macOS binary (macos-latest)"
        required: true
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: build-release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  preflight-tests:
    if: >-
      github.event_name == 'workflow_dispatch' &&
      github.repository == 'NetSPI/gcpwn' &&
      github.actor == 'WebbinRoot' &&
      github.triggering_actor == 'WebbinRoot' &&
      inputs.run_tests &&
      github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout
        # v6.0.2
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Setup Python
        # v6.2.0
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install .[dev]

      - name: Run unit tests
        run: python -m pytest -q -ra tests/unit tests/module_contracts

  resolve-build-targets:
    if: >-
      always() &&
      !cancelled() &&
      github.event_name == 'workflow_dispatch' &&
      github.repository == 'NetSPI/gcpwn' &&
      github.actor == 'WebbinRoot' &&
      github.triggering_actor == 'WebbinRoot' &&
      (needs.preflight-tests.result == 'success' || needs.preflight-tests.result == 'skipped') &&
      github.ref == 'refs/heads/main'
    needs: preflight-tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      os_matrix: ${{ steps.set-matrix.outputs.os_matrix }}
    steps:
      - name: Resolve selected OS targets
        id: set-matrix
        shell: bash
        env:
          BUILD_LINUX: ${{ inputs.build_linux }}
          BUILD_MACOS: ${{ inputs.build_macos }}
        run: |
          python - <<'PY'
          import json
          import os
          import sys

          selected = []
          if os.environ.get("BUILD_LINUX", "").lower() == "true":
              selected.append("ubuntu-latest")
          if os.environ.get("BUILD_MACOS", "").lower() == "true":
              selected.append("macos-latest")

          if not selected:
              print("Select at least one build target OS (linux/macos).", file=sys.stderr)
              sys.exit(1)

          out_path = os.environ["GITHUB_OUTPUT"]
          with open(out_path, "a", encoding="utf-8") as handle:
              handle.write(f"os_matrix={json.dumps(selected)}\n")

          print(f"Resolved build targets: {selected}")
          PY

  build-executables:
    if: >-
      github.event_name == 'workflow_dispatch' &&
      github.repository == 'NetSPI/gcpwn' &&
      github.actor == 'WebbinRoot' &&
      github.triggering_actor == 'WebbinRoot' &&
      github.ref == 'refs/heads/main'
    needs:
      - create-release
      - resolve-build-targets
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJSON(needs.resolve-build-targets.outputs.os_matrix) }}
        extras_label: [base, table, excel, table_excel]
    name: Build (${{ matrix.os }} | ${{ matrix.extras_label }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 35
    permissions:
      contents: write
    steps:
      - name: Checkout
        # v6.0.2
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Setup Python
        # v6.2.0
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        shell: bash
        run: |
          case "${{ matrix.extras_label }}" in
            base)
              EXTRAS=""
              ;;
            table)
              EXTRAS="table"
              ;;
            excel)
              EXTRAS="excel"
              ;;
            table_excel)
              EXTRAS="table,excel"
              ;;
            *)
              echo "Unsupported extras_label: ${{ matrix.extras_label }}"
              exit 1
              ;;
          esac

          if [ -n "$EXTRAS" ]; then
            python -m pip install ".[${EXTRAS}]" pyinstaller==6.20.0
          else
            python -m pip install . pyinstaller==6.20.0
          fi

      - name: Build executable
        shell: bash
        run: |
          # --noconfirm: overwrite existing output files/directories without interactive prompts.
          # --clean: remove temporary build cache from prior runs before building.
          # --onefile: emit a single-file executable rather than a folder-based bundle.
          # --name gcpwn: set the final executable name.
          # --collect-submodules gcpwn: include dynamically imported gcpwn modules.
          # --collect-data gcpwn: include packaged non-Python data files used at runtime.
          # gcpwn/__main__.py: build from the package CLI entrypoint.
          python -m PyInstaller \
            --noconfirm \
            --clean \
            --onefile \
            --name gcpwn \
            --collect-submodules gcpwn \
            --collect-data gcpwn \
            gcpwn/__main__.py

      - name: Verify executable
        shell: bash
        run: |
          EXECUTABLE="dist/gcpwn"
          test -f "$EXECUTABLE"
          "$EXECUTABLE" --help >/dev/null
          echo "Verified executable: $EXECUTABLE"

      - name: Prepare artifact
        shell: bash
        run: |
          mkdir -p release
          SRC="dist/gcpwn"
          DST="release/gcpwn-${{ matrix.os }}-${{ matrix.extras_label }}"
          cp "$SRC" "$DST"
          echo "ASSET_PATH=$DST" >> "$GITHUB_ENV"

      - name: Upload artifact to GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          test -f "$ASSET_PATH"
          gh release upload "$RELEASE_TAG" "$ASSET_PATH" --clobber

  create-release:
    if: >-
      always() &&
      !cancelled() &&
      github.event_name == 'workflow_dispatch' &&
      github.repository == 'NetSPI/gcpwn' &&
      github.actor == 'WebbinRoot' &&
      github.triggering_actor == 'WebbinRoot' &&
      needs.resolve-build-targets.result == 'success' &&
      (needs.preflight-tests.result == 'success' || needs.preflight-tests.result == 'skipped') &&
      needs.release-approval.result == 'success' &&
      github.ref == 'refs/heads/main'
    needs:
      - preflight-tests
      - resolve-build-targets
      - release-approval
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Create or update GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          RELEASE_TITLE: ${{ inputs.release_title }}
          RELEASE_NOTES: ${{ inputs.release_notes }}
          RELEASE_TARGET: ${{ github.sha }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" \
              --title "$RELEASE_TITLE" \
              --notes "$RELEASE_NOTES"
          else
            gh release create "$RELEASE_TAG" \
              --target "$RELEASE_TARGET" \
              --title "$RELEASE_TITLE" \
              --notes "$RELEASE_NOTES"
          fi

  release-approval:
    # Manual gate for release operations.
    # This job must pass before create-release/build-executables can write assets to Releases.
    if: >-
      always() &&
      !cancelled() &&
      github.event_name == 'workflow_dispatch' &&
      github.repository == 'NetSPI/gcpwn' &&
      github.actor == 'WebbinRoot' &&
      github.triggering_actor == 'WebbinRoot' &&
      needs.resolve-build-targets.result == 'success' &&
      (needs.preflight-tests.result == 'success' || needs.preflight-tests.result == 'skipped') &&
      github.ref == 'refs/heads/main'
    needs:
      - preflight-tests
      - resolve-build-targets
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: release
    permissions:
      contents: read
    steps:
      - name: Assert protected release environment
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Guard against implicit, unprotected environment creation.
          # If 'release' exists without protection rules, fail closed.
          RULE_COUNT="$(gh api "repos/${GITHUB_REPOSITORY}/environments/release" --jq '.protection_rules | length')"
          if [ "${RULE_COUNT}" -lt 1 ]; then
            echo "Release environment exists but has no protection rules configured."
            exit 1
          fi

      - name: Await protected release approval
        run: echo "Release environment approved."
