name: Publish to PyPI

on:
  workflow_dispatch:
    inputs:
      repository:
        description: "Target repository"
        required: true
        type: choice
        options:
          - testpypi
          - pypi
        default: testpypi
      run_tests:
        description: "Run unit tests before publish"
        required: true
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  build-and-publish:
    if: >-
      github.event_name == 'workflow_dispatch' &&
      github.repository == 'NetSPI/gcpwn' &&
      github.actor == 'WebbinRoot' &&
      github.triggering_actor == 'WebbinRoot' &&
      github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Trusted publishing: the per-repository environment scopes the OIDC identity.
    environment: ${{ inputs.repository }}
    steps:
      - name: Checkout
        # v7.0.0
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          fetch-depth: 1

      - name: Setup Python
        # v6.3.0
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Run unit tests
        if: ${{ inputs.run_tests }}
        run: |
          python -m pip install .[dev]
          python -m pytest -q -ra tests/unit

      - name: Build distribution
        run: |
          python -m pip install -U pip build
          python -m build

      - name: Smoke built wheel before publishing
        # Install the freshly built wheel (no deps -> fast) and exercise it from
        # OUTSIDE the source tree, so a broken package (missing bundled data, wrong
        # entry point, non-writable databases path) fails here, not live on PyPI.
        run: |
          python -m pip install --no-deps dist/*.whl
          cd "$RUNNER_TEMP"
          gcpwn --help >/dev/null
          python - <<'PY'
          from importlib import resources
          from gcpwn.core.db import DataController
          from gcpwn.core.utils.module_helpers import load_mapping_data
          assert load_mapping_data("module_mappings.json", kind="json"), "mappings not bundled"
          assert load_mapping_data("database_info.json", kind="json"), "database_info.json not bundled"
          assert resources.files("gcpwn.modules.gcp.cloudstorage.utilities.data").joinpath("top_level_domains.txt").is_file(), "per-module data not bundled"
          assert "site-packages" not in DataController.database_path, "databases path under site-packages"
          print("Built wheel smoke passed.")
          PY

      - name: Publish to ${{ inputs.repository }}
        # v1.14.0 (release/v1)
        uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247
        with:
          repository-url: ${{ inputs.repository == 'testpypi' && 'https://test.pypi.org/legacy/' || 'https://upload.pypi.org/legacy/' }}
