name: Publish to PyPI

on:
  workflow_dispatch:
    inputs:
      repository:
        description: "Target repository"
        required: true
        type: choice
        options:
          - testpypi
          - pypi
        default: testpypi
      run_tests:
        description: "Run unit tests before publish"
        required: true
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  build-and-publish:
    if: >-
      github.event_name == 'workflow_dispatch' &&
      github.repository == 'NetSPI/gcpwn' &&
      github.actor == 'WebbinRoot' &&
      github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: ${{ inputs.repository }}
    steps:
      - name: Checkout
        # v6.0.2
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 1

      - name: Setup Python
        # v6.2.0
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Run unit tests
        if: ${{ inputs.run_tests }}
        run: |
          python -m pip install .[dev]
          python -m pytest -q -ra tests/unit

      - name: Build dist
        run: python -m build

      - name: Publish to PyPI
        if: ${{ inputs.repository == 'pypi' }}
        # v1.13.0 (release/v1)
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b

      - name: Publish to TestPyPI
        if: ${{ inputs.repository == 'testpypi' }}
        # v1.12.4 (release/v1)
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
        with:
          repository-url: https://test.pypi.org/legacy/

